version: "3.9"

services:
  backend:
    build: ./backend
    container_name: backend
    ports:
      - "5000:5000"
    environment:
      - MONGO_URI=${MONGO_URI}
      - JWT_SECRET=B${JWT_SECRET}

  frontend:
    build: ./frontend/course-register
    container_name: frontend
    ports:
      - "3000:80"
    depends_on:
      - backend